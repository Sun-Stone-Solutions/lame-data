<!DOCTYPE html>
<html lang="en" data-theme="dark">
<script>(function(){var t=localStorage.getItem('theme')||'catppuccin-mocha';document.documentElement.setAttribute('data-theme-palette',t);if(['catppuccin-latte'].includes(t))document.documentElement.setAttribute('data-theme','light');})()</script>
<head>
    <title>Settings - Lame Data</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <style>
        header {
            text-align: center;
            margin-bottom: 1rem;
        }
        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        .device-config-card {
            padding: 1rem;
            border-radius: var(--pico-border-radius);
            background: var(--pico-card-background-color);
            border: 2px solid var(--pico-muted-border-color);
        }
        .device-config-card.connected {
            border-color: var(--ctp-green);
        }
        .device-config-card.disconnected {
            border-color: var(--ctp-red);
            opacity: 0.6;
        }
        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .device-title {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .battery-info {
            font-size: 0.9rem;
            color: var(--pico-muted-color);
        }
        .firmware-info {
            font-size: 0.8rem;
            color: var(--pico-muted-color);
            margin-top: 0.25rem;
        }
        .firmware-info.outdated { color: var(--ctp-yellow, goldenrod); }
        .firmware-info.unknown { color: var(--pico-muted-color); opacity: 0.6; }
        .firmware-info.current { color: var(--ctp-green, green); }
        .flash-single-btn {
            margin-top: 0.5rem;
            padding: 0.25rem 0.6rem;
            font-size: 0.8rem;
            width: 100%;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: color-mix(in srgb, var(--ctp-crust) 92%, transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .overlay .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--ctp-surface1);
            border-top-color: var(--ctp-mauve);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .overlay .overlay-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--ctp-text);
            margin-bottom: 0.5rem;
        }
        .overlay .overlay-detail {
            color: var(--ctp-subtext0);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>Settings</h1>
            <div class="nav-bar">
                <a href="/">Recorder</a>
                <a href="/sessions">Sessions</a>
                <a href="/settings" class="active">Settings</a>
            </div>
        </header>

        <article>
            <h2>Theme</h2>
            <label for="themeSelect">Color Scheme</label>
            <select id="themeSelect" onchange="setTheme(this.value)">
                <option value="catppuccin-mocha">Catppuccin Mocha</option>
                <option value="catppuccin-latte">Catppuccin Latte</option>
                <option value="gruvbox-dark">Gruvbox Dark</option>
                <option value="solarized-dark">Solarized Dark</option>
                <option value="nord">Nord</option>
                <option value="dracula">Dracula</option>
                <option value="tokyo-night">Tokyo Night</option>
            </select>
        </article>

        <article>
            <h2>Device Configuration</h2>
            <p>Assign each sensor to a position on the horse. Sensors appear here automatically when they connect.</p>
            <div id="deviceGrid" class="device-grid"></div>
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:1rem;">
                <button onclick="saveDeviceConfig()">Save Configuration</button>
                <button id="flashAllBtn" class="outline" onclick="flashAllPluggedIn()" disabled
                        title="Plug out-of-date sensors into the charging hub to enable">
                    Flash All Plugged-In
                </button>
            </div>
        </article>

        <article>
            <h2>System</h2>
            <button class="outline" onclick="confirmUpgrade()" style="width:100%; margin-bottom:1rem;">Update Software</button>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <button class="outline" onclick="confirmReboot()">Reboot Pi</button>
                <button class="btn-stop" onclick="confirmShutdown()">Shutdown Pi</button>
            </div>
        </article>

        <dialog id="flashModal">
            <article>
                <h3 id="flashModalTitle">Updating firmware…</h3>
                <div id="flashModalTargets"></div>
                <footer>
                    <button id="flashModalClose" class="secondary" onclick="closeFlashModal()" disabled>Close</button>
                </footer>
            </article>
        </dialog>

        <dialog id="systemDialog">
            <article>
                <h3 id="dialogTitle">Confirm</h3>
                <p id="dialogMessage"></p>
                <footer>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                        <button class="outline" onclick="document.getElementById('systemDialog').close()">Cancel</button>
                        <button class="btn-stop" id="dialogConfirm">Confirm</button>
                    </div>
                </footer>
            </article>
        </dialog>

        <footer>
            <small>Lame Data - Open Source Horse Biomechanics</small>
        </footer>
    </main>

    <div class="overlay" id="overlay" style="display:none">
        <div class="spinner"></div>
        <div class="overlay-title" id="overlayTitle"></div>
        <div class="overlay-detail" id="overlayDetail"></div>
    </div>

    <script>
        let deviceConfig = null;
        let availablePositions = [];
        let allDeviceIds = new Set();

        async function loadDeviceConfig() {
            const response = await fetch('/api/device_config');
            deviceConfig = await response.json();
            availablePositions = deviceConfig.positions || [];
            Object.keys(deviceConfig.devices || {}).forEach(id => allDeviceIds.add(id));
            renderDeviceGrid();
        }

        function renderDeviceGrid() {
            const grid = document.getElementById('deviceGrid');
            if (!deviceConfig) return;

            let html = '';
            for (const deviceId of allDeviceIds) {
                const device = deviceConfig.devices[deviceId] || { position: '', color: '#999' };
                html += `
                    <div class="device-config-card" id="device-card-${deviceId}">
                        <div class="device-header">
                            <span class="device-title">ID: ${deviceId}</span>
                            <span class="battery-info" id="battery-${deviceId}">--</span>
                        </div>
                        <div class="firmware-info" id="firmware-${deviceId}">Firmware: --</div>
                        <label for="position-${deviceId}" style="margin-top:0.5rem;">Position</label>
                        <select id="position-${deviceId}" data-device="${deviceId}">
                            <option value="">Not in use</option>
                            ${availablePositions.map(pos =>
                                `<option value="${pos.id}" ${device.position === pos.id ? 'selected' : ''}>${pos.label}</option>`
                            ).join('')}
                        </select>
                        <button id="flash-${deviceId}" class="flash-single-btn outline"
                                onclick="flashDevice('${deviceId}')" disabled
                                title="Plug this sensor into power and wait for it to report charging">
                            Flash Firmware
                        </button>
                        <button class="outline secondary" style="margin-top:0.5rem;padding:0.2rem 0.6rem;font-size:0.75rem;" onclick="removeDevice('${deviceId}')">Remove Sensor</button>
                    </div>
                `;
            }

            if (allDeviceIds.size === 0) {
                html = '<p style="color: var(--pico-muted-color); text-align: center;">No sensors detected yet. Power on your sensors and wait for them to connect.</p>';
            }

            grid.innerHTML = html;
        }

        async function removeDevice(deviceId) {
            if (!confirm(`Remove sensor ${deviceId}? It will reappear if it connects again.`)) return;
            allDeviceIds.delete(deviceId);
            delete deviceConfig.devices[deviceId];
            await fetch('/api/device_config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(deviceConfig)
            });
            renderDeviceGrid();
        }

        async function saveDeviceConfig() {
            if (!deviceConfig) return;

            const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF'];
            let colorIndex = 0;

            for (const deviceId of allDeviceIds) {
                const select = document.getElementById(`position-${deviceId}`);
                const position = select.value;

                if (position) {
                    deviceConfig.devices[deviceId] = {
                        position: position,
                        color: deviceConfig.devices[deviceId]?.color || colors[colorIndex % colors.length]
                    };
                    colorIndex++;
                } else {
                    delete deviceConfig.devices[deviceId];
                }
            }

            const response = await fetch('/api/device_config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(deviceConfig)
            });

            if (response.ok) {
                alert('Configuration saved!');
            }
        }

        // ---- Firmware / OTA ----
        let availableFirmwareVersion = null;
        let flashPollTimer = null;

        async function loadFirmwareStatus() {
            try {
                const r = await fetch('/api/firmware');
                const data = await r.json();
                availableFirmwareVersion = data.available_version;
            } catch (e) {
                availableFirmwareVersion = null;
            }
            updateFlashAllBtn();
        }

        function updateFirmwareRow(deviceId, status) {
            const row = document.getElementById(`firmware-${deviceId}`);
            const btn = document.getElementById(`flash-${deviceId}`);
            if (!row) return;

            const ver = status.firmware_version || 'unknown';
            row.textContent = `Firmware: ${ver === 'unknown' ? 'unknown (pre-OTA)' : 'v' + ver}`;
            row.classList.remove('outdated', 'unknown', 'current');

            if (!availableFirmwareVersion) { return; }
            if (ver === 'unknown') row.classList.add('unknown');
            else if (ver === availableFirmwareVersion) row.classList.add('current');
            else row.classList.add('outdated');

            if (btn) {
                const outdated = ver !== 'unknown' && ver !== availableFirmwareVersion;
                const plugged = !!status.charging;
                btn.disabled = !(outdated && plugged && status.connected);
            }
        }

        function updateFlashAllBtn() {
            const btn = document.getElementById('flashAllBtn');
            if (!btn) return;
            const outdatedPlugged = Array.from(allDeviceIds).some(id => {
                const row = document.getElementById(`firmware-${id}`);
                return row && row.classList.contains('outdated')
                    && document.getElementById(`battery-${id}`)?.textContent.startsWith('⚡');
            });
            btn.disabled = !outdatedPlugged;
        }

        async function flashDevice(deviceId) {
            await startFlash({ device_ids: [deviceId] });
        }

        async function flashAllPluggedIn() {
            await startFlash({ all_plugged_in: true });
        }

        async function startFlash(body) {
            const resp = await fetch('/api/firmware/flash', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({error: 'flash failed'}));
                alert(err.error || 'flash failed');
                return;
            }
            document.getElementById('flashModalClose').disabled = true;
            document.getElementById('flashModal').showModal();
            pollFlashStatus();
        }

        async function pollFlashStatus() {
            try {
                const r = await fetch('/api/firmware/flash_status');
                const state = await r.json();
                renderFlashTargets(state);
                if (state.active) {
                    flashPollTimer = setTimeout(pollFlashStatus, 500);
                } else {
                    document.getElementById('flashModalClose').disabled = false;
                    setTimeout(loadFirmwareStatus, 1000);
                }
            } catch (e) {
                flashPollTimer = setTimeout(pollFlashStatus, 1000);
            }
        }

        function renderFlashTargets(state) {
            const container = document.getElementById('flashModalTargets');
            const targets = state.targets || {};
            const ids = Object.keys(targets);

            // Stage banner — gives the user something to read during the
            // ~30s build phase when no per-device progress is moving.
            let banner = '';
            if (state.stage === 'building') {
                const startMs = state.build_started_at ? new Date(state.build_started_at).getTime() : Date.now();
                const elapsedSec = Math.max(0, (Date.now() - startMs) / 1000);
                const expected = state.expected_build_seconds;
                let label, pct;
                if (expected && expected > 0) {
                    pct = Math.min(95, (elapsedSec / expected) * 100);
                    label = `Building firmware… ${Math.floor(elapsedSec)}s of ~${Math.floor(expected)}s`;
                } else {
                    pct = 0;
                    label = `Building firmware… ${Math.floor(elapsedSec)}s elapsed (first build, no estimate yet)`;
                }
                banner = `
                    <p style="margin:0 0 0.5rem 0;"><em>${label}</em></p>
                    <progress value="${pct}" max="100" style="width:100%; height:8px; margin:0 0 0.75rem 0;"></progress>
                `;
            } else if (state.stage === 'flashing') {
                const done = ids.filter(i => ['done','failed'].includes(targets[i].state)).length;
                const inProgress = ids.find(i => targets[i].state === 'running');
                const idx = inProgress ? done + 1 : done;
                banner = `<p style="margin:0 0 0.75rem 0;"><em>Flashing ${Math.min(idx, ids.length)} of ${ids.length}…</em></p>`;
            } else if (state.stage === 'done') {
                const ok = ids.filter(i => targets[i].state === 'done').length;
                banner = `<p style="margin:0 0 0.75rem 0;"><strong>Complete: ${ok}/${ids.length} sensors updated.</strong></p>`;
            }

            if (ids.length === 0) {
                container.innerHTML = banner + '<p>Preparing flash…</p>';
                return;
            }
            container.innerHTML = banner + ids.map(id => {
                const t = targets[id];
                const pct = t.progress || 0;
                let statusText;
                if (t.state === 'pending') statusText = 'Pending';
                else if (t.state === 'running') statusText = `Running — ${pct}%`;
                else if (t.state === 'done') statusText = 'Done ✓';
                else if (t.state === 'failed') statusText = `Failed: ${t.error || 'unknown'}`;
                else statusText = t.state;
                return `
                    <div style="margin: 0.75rem 0;">
                        <div style="display:flex; justify-content:space-between; font-size:0.9rem;">
                            <strong>${id}</strong>
                            <span>${statusText}</span>
                        </div>
                        <progress value="${pct}" max="100" style="width:100%; height:8px; margin:0.25rem 0 0 0;"></progress>
                    </div>
                `;
            }).join('');
        }

        function closeFlashModal() {
            if (flashPollTimer) { clearTimeout(flashPollTimer); flashPollTimer = null; }
            document.getElementById('flashModal').close();
        }

        function updateDeviceStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    const previousSize = allDeviceIds.size;
                    Object.keys(data.device_status || {}).forEach(id => allDeviceIds.add(id));

                    if (allDeviceIds.size > previousSize) {
                        renderDeviceGrid();
                    }

                    for (const deviceId of allDeviceIds) {
                        const card = document.getElementById(`device-card-${deviceId}`);
                        const batterySpan = document.getElementById(`battery-${deviceId}`);
                        if (!card || !batterySpan) continue;

                        if (data.device_status[deviceId]) {
                            const status = data.device_status[deviceId];
                            card.classList.toggle('connected', status.connected);
                            card.classList.toggle('disconnected', !status.connected);
                            const bolt = status.charging ? '⚡ ' : '';
                            batterySpan.textContent = status.connected
                                ? `${bolt}${status.percent.toFixed(0)}%`
                                : 'Offline';
                            updateFirmwareRow(deviceId, status);
                        } else {
                            card.classList.remove('connected');
                            card.classList.add('disconnected');
                            batterySpan.textContent = '--';
                        }
                    }
                });
        }

        function confirmUpgrade() {
            showDialog('Update Software', 'This will pull the latest code, install dependencies, and restart the service.', 'upgrade');
        }
        function confirmReboot() {
            showDialog('Reboot Pi', 'The Pi will reboot. The web UI will be unavailable for about a minute.', 'reboot');
        }
        function confirmShutdown() {
            showDialog('Shutdown Pi', 'The Pi will shut down. You will need physical access to power it back on.', 'shutdown');
        }

        function showDialog(title, message, action) {
            document.getElementById('dialogTitle').textContent = title;
            document.getElementById('dialogMessage').textContent = message;
            document.getElementById('dialogConfirm').onclick = () => executeAction(action);
            document.getElementById('systemDialog').showModal();
        }

        function showOverlay(title, detail) {
            document.getElementById('overlayTitle').textContent = title;
            document.getElementById('overlayDetail').textContent = detail;
            document.getElementById('overlay').style.display = 'flex';
        }

        function hideOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }

        function executeAction(action) {
            document.getElementById('systemDialog').close();

            if (action === 'upgrade') {
                showOverlay('Updating...', 'Pulling latest code and installing dependencies');
                fetch('/api/upgrade', { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        if (data.success) {
                            showOverlay('Restarting...', 'Service is restarting, page will reload automatically');
                            waitForReconnect();
                        } else {
                            hideOverlay();
                            const err = data.steps.find(s => !s.success);
                            alert('Update failed at: ' + err.step + '\n' + err.error);
                        }
                    })
                    .catch(() => {
                        hideOverlay();
                        alert('Update failed.');
                    });
                return;
            }

            if (action === 'reboot') {
                showOverlay('Rebooting...', 'Page will reload automatically when the Pi is back');
            } else {
                showOverlay('Shutting Down...', 'You will need physical access to power the Pi back on');
            }

            fetch('/api/shutdown', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action})
            }).then(r => r.json()).then(data => {
                if (data.success && action === 'reboot') {
                    waitForReconnect();
                }
            });
        }

        function waitForReconnect() {
            const poll = setInterval(() => {
                fetch('/api/status')
                    .then(r => { if (r.ok) { clearInterval(poll); location.reload(); } })
                    .catch(() => {});
            }, 2000);
        }

        // Theme switcher
        document.getElementById('themeSelect').value = localStorage.getItem('theme') || 'catppuccin-mocha';

        function setTheme(theme) {
            localStorage.setItem('theme', theme);
            location.reload();
        }

        loadDeviceConfig()
            .then(loadFirmwareStatus)
            .then(() => {
                updateDeviceStatus();
                setInterval(() => { updateDeviceStatus(); updateFlashAllBtn(); }, 2000);
            });
    </script>
</body>
</html>
